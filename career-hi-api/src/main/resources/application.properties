# ===============================
# Application Name
# ===============================
spring.application.name=career-hi-api


spring.datasource.url=jdbc:mariadb://158.179.194.12#spring.datasource.url=jdbc:mariadb://158.179.194.12:3306/career_hi?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- JPA ?? ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# H2 Console Settings
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===============================
# File Upload Limits (10MB)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# AWS S3 (Spring Cloud AWS)
# ===============================
spring.cloud.aws.s3.bucket=career-hi-bucket
spring.cloud.aws.region.static=ap-northeast-2
# \uBCF4\uC548\uC744 \uC704\uD574 \uD658\uACBD\uBCC0\uC218(OS\uB098 IntelliJ \uC124\uC815)\uC5D0 \uB123\uC5B4\uC8FC\uC138\uC694!
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}

# ===============================
# Logging Levels
# ===============================
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace

# ===============================
# CoolSMS Settings
# ===============================
# \uD638\uCD9C \uACBD\uB85C \uC124\uC815
coolsms.api.url=https://api.coolsms.co.kr

# secret \uD30C\uC77C\uC5D0\uC11C \uAC12\uC744 \uAC00\uC838\uC624\uB3C4\uB85D \uBCC0\uC218\uD654
coolsms.api-key=${COOLSMS_API_KEY}
coolsms.api-secret=${COOLSMS_API_SECRET}
coolsms.from-number=${COOLSMS_FROM_NUMBER}

# ?? ? ?? ????(gitignore)
spring.config.import=optional:classpath:application-secret.properties

name: Deploy to OCI

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Transfer Jar to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "**/build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 3

      - name: Execute Server
        uses: appleboy/ssh-action@master
        with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.USERNAME }}
            key: ${{ secrets.KEY }}
            script: |
              sudo fuser -k 8080/tcp || true
              rm -f /home/ubuntu/app/*-plain.jar
              
              nohup java -Xmx400M -jar -Duser.timezone=Asia/Seoul \
                -Dspring.datasource.url=jdbc:mariadb://localhost:3306/career_hi \
                -Dspring.datasource.username=root \
                -Dspring.datasource.password=${{ secrets.DB_PASSWORD }} \
                -Djwt.secret=${{ secrets.JWT_SECRET }} \
                -Dopenai.api.key=${{ secrets.OPENAI_API_KEY }} \
                -DCOOLSMS_API_KEY=${{ secrets.COOLSMS_API_KEY }} \
                -DCOOLSMS_API_SECRET=${{ secrets.COOLSMS_API_SECRET }} \
                -DCOOLSMS_FROM_NUMBER=${{ secrets.COOLSMS_FROM_NUMBER }} \
                -DAWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
                -DAWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
                /home/ubuntu/app/*.jar > /home/ubuntu/nohup.out 2>&1 &